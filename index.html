<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotijai - by zaza</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0a84ff; --gray: #8e8e93; --orange: #ff9f0a; --red: #ff453a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; padding: 0 20px 220px; }
        body.modal-open { overflow: hidden; position: fixed; width: 100%; }

        header { padding: 50px 0 10px; }
        .brand { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        #search-bar { width: 100%; padding: 12px 15px; border-radius: 12px; border: none; background: #2c2c2e; color: white; font-size: 16px; outline: none; box-sizing: border-box; margin-bottom: 20px; }

        .song-wrapper { position: relative; margin-bottom: 8px; height: 64px; border-radius: 14px; overflow: hidden; background: #111; touch-action: pan-y; }
        .bg-container { position: absolute; width: 100%; height: 100%; display: flex; }
        .bg-pl { flex: 1; background: var(--accent); display: flex; align-items: center; padding-left: 20px; font-weight: 600; font-size: 11px; }
        .bg-queue { flex: 1; background: var(--orange); display: flex; align-items: center; justify-content: flex-end; padding-right: 20px; font-weight: 600; font-size: 11px; }
        
        .song-content { position: absolute; width: 100%; height: 100%; background: var(--card); display: flex; align-items: center; padding: 0 16px; z-index: 2; transition: transform 0.2s; box-sizing: border-box; }
        .song-content.active { border-left: 5px solid var(--accent); background: #262629; }

        /* PLAYER PANEL */
        .player-panel { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(22, 22, 23, 0.98); backdrop-filter: blur(30px); z-index: 1000; border-top: 0.5px solid #333; height: 90vh; transform: translateY(calc(90vh - 180px)); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column; }
        .player-panel.expanded { transform: translateY(0); border-radius: 20px 20px 0 0; }
        .queue-view { flex: 1; overflow-y: auto; padding: 25px; overscroll-behavior: contain; }

        /* BARRA DE PROGRESO */
        .controls-container { padding: 0 35px; }
        input[type="range"] { width: 100%; accent-color: var(--accent); margin: 15px 0; height: 4px; }
        .time-info { display: flex; justify-content: space-between; color: var(--gray); font-size: 11px; margin-top: -10px; }

        /* MENU INFERIOR */
        #action-sheet { position: fixed; bottom: 0; left: 0; right: 0; top: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: flex-end; }
        .sheet-content { background: #1c1c1e; width: 100%; border-radius: 20px 20px 0 0; padding: 20px; transform: translateY(100%); transition: transform 0.3s; }
        .sheet-item { padding: 18px; border-bottom: 0.5px solid #333; text-align: center; color: var(--accent); font-size: 18px; }
        
        #toast { position: fixed; top: 12%; left: 50%; transform: translateX(-50%); background: var(--orange); color: black; padding: 10px 20px; border-radius: 25px; font-weight: bold; opacity: 0; transition: 0.3s; z-index: 3000; pointer-events: none; }
        #file-in { display: none; }
        .btn-play-all { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 20px; width: 100%; }
    </style>
</head>
<body>

    <header>
        <div class="brand"><h1>Spotijai</h1><button onclick="document.getElementById('file-in').click()" style="color:var(--accent); background:none; border:none; font-size:16px;">Añadir</button></div>
        <input type="text" id="search-bar" placeholder="Buscar música..." oninput="filterAll()">
    </header>

    <div id="main-list"></div>
    <div id="toast">Notificación</div>
    
    <div id="action-sheet" onclick="closeSheet()">
        <div class="sheet-content" id="sheet-box">
            <div id="playlist-options"></div>
            <div class="sheet-item" onclick="createNewPlaylist()">+ Nueva Playlist</div>
            <div class="sheet-item" style="color:var(--red); border:none;" onclick="closeSheet()">Cancelar</div>
        </div>
    </div>

    <input type="file" id="file-in" webkitdirectory directory multiple>

    <div class="player-panel" id="player">
        <div class="handle-area" id="drag-zone" style="padding:20px 0;"><div style="width:40px; height:5px; background:#444; border-radius:3px; margin:0 auto;"></div></div>
        <div id="current-track" style="text-align:center; font-size:14px; color:var(--accent); font-weight:600; padding:0 30px; overflow:hidden; text-overflow:ellipsis;">Selecciona música</div>
        
        <div class="controls-container">
            <input type="range" id="seek" value="0" step="0.1">
            <div class="time-info"><span id="time-cur">0:00</span><span id="time-total">0:00</span></div>
        </div>

        <div style="display:flex; justify-content:space-around; padding:10px 30px 20px;">
            <button onclick="prev()" style="background:none; border:none; fill:white;"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button onclick="togglePlay()" style="background:white; border-radius:50%; width:60px; height:60px; border:none; display:flex; align-items:center; justify-content:center;"><svg id="play-icon" width="30" height="30" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
            <button onclick="next()" style="background:none; border:none; fill:white;"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"/></svg></button>
        </div>
        <div class="queue-view" id="panel-content"></div>
    </div>

    <script>
        let db = [], queue = [], currentIdx = -1, isPlaying = false, pendingFile = null;
        let playlists = JSON.parse(localStorage.getItem('spotijai_vFinal')) || {};
        const audio = new Audio();
        const seek = document.getElementById('seek');

        // GESTOS PANEL
        let pStartY = 0;
        document.getElementById('drag-zone').addEventListener('touchstart', e => pStartY = e.touches[0].clientY);
        document.getElementById('drag-zone').addEventListener('touchend', e => {
            let diff = pStartY - e.changedTouches[0].clientY;
            if (diff > 30) { document.getElementById('player').classList.add('expanded'); document.body.classList.add('modal-open'); }
            if (diff < -30) { document.getElementById('player').classList.remove('expanded'); document.body.classList.remove('modal-open'); }
        });

        document.getElementById('file-in').onchange = e => { db = Array.from(e.target.files).filter(f => f.name.endsWith('.mp3')); filterAll(); };

        function filterAll() { renderMainList(document.getElementById('search-bar').value.toLowerCase()); renderPanelHome(); }

        function renderMainList(query = "") {
            const list = document.getElementById('main-list');
            const filtered = db.filter(f => f.name.toLowerCase().includes(query));
            list.innerHTML = filtered.map((f, i) => `
                <div class="song-wrapper">
                    <div class="bg-container"><div class="bg-pl">📝 Playlist</div><div class="bg-queue">Cola ⏭️</div></div>
                    <div class="song-content ${currentIdx !== -1 && db[currentIdx].name === f.name ? 'active' : ''}" id="sm-${i}">
                        <span>${f.name.replace('.mp3','')}</span>
                    </div>
                </div>`).join('');
            filtered.forEach((f, i) => attachGestures(`sm-${i}`, f));
        }

        function attachGestures(id, file) {
            const el = document.getElementById(id);
            let startX = 0, startY = 0, currentX = 0, lock = null;
            el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; lock = null; el.style.transition = 'none'; }, {passive: true});
            el.addEventListener('touchmove', e => {
                let dx = e.touches[0].clientX - startX; let dy = e.touches[0].clientY - startY;
                if (!lock) { if (Math.abs(dx) > 10) lock = 'horizontal'; else if (Math.abs(dy) > 10) lock = 'vertical'; }
                if (lock === 'horizontal') { if (e.cancelable) e.preventDefault(); currentX = dx; el.style.transform = `translateX(${currentX}px)`; }
            }, {passive: false});
            el.addEventListener('touchend', () => {
                el.style.transition = 'transform 0.2s'; el.style.transform = 'translateX(0)';
                if (lock === 'horizontal') {
                    if (currentX < -80) addToQueue(file); else if (currentX > 80) openPlaylistMenu(file);
                } else if (!lock) playAt(db.findIndex(f => f.name === file.name));
            });
        }

        function openPlaylistMenu(file) {
            pendingFile = file;
            const options = document.getElementById('playlist-options');
            options.innerHTML = Object.keys(playlists).map(n => `<div class="sheet-item" onclick="saveToPlaylist('${n}')">${n}</div>`).join('');
            document.getElementById('action-sheet').style.display = 'flex';
            setTimeout(() => document.getElementById('sheet-box').style.transform = 'translateY(0)', 10);
        }

        function saveToPlaylist(name) {
            if (!playlists[name].includes(pendingFile.name)) { playlists[name].push(pendingFile.name); localStorage.setItem('spotijai_vFinal', JSON.stringify(playlists)); }
            closeSheet(); showToast(`Añadido a ${name}`, "var(--accent)"); renderPanelHome();
        }

        function createNewPlaylist() { let n = prompt("Nombre:"); if(n) { playlists[n] = []; saveToPlaylist(n); } }
        function closeSheet() { document.getElementById('sheet-box').style.transform = 'translateY(100%)'; setTimeout(() => document.getElementById('action-sheet').style.display = 'none', 300); }

        function renderPanelHome() {
            const content = document.getElementById('panel-content');
            content.innerHTML = `
                <h3 style="color:var(--orange)">Cola</h3>
                <div style="margin-bottom:25px;">${queue.map(f => `<div style="padding:8px 0; border-bottom:1px solid #333; font-size:13px;">${f.name}</div>`).join('') || 'Vacía'}</div>
                <h3 style="color:var(--accent)">Playlists</h3>
                ${Object.keys(playlists).map(n => `<div onclick="renderPlaylistDetail('${n}')" style="background:#222; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between;"><span>📂 ${n}</span><span>${playlists[n].length} ›</span></div>`).join('')}`;
        }

        function renderPlaylistDetail(name) {
            const content = document.getElementById('panel-content');
            const songs = db.filter(f => playlists[name].includes(f.name));
            content.innerHTML = `
                <div onclick="renderPanelHome()" style="color:var(--accent); font-weight:bold; margin-bottom:15px;">‹ Volver</div>
                <h2>${name}</h2>
                <button class="btn-play-all" onclick="playAllFromPlaylist('${name}')">▶ Reproducir Todo</button>
                ${songs.map(f => `<div onclick="playAt(db.indexOf(db.find(x=>x.name==='${f.name}')))" style="padding:15px 0; border-bottom:1px solid #333; font-size:14px;">${f.name.replace('.mp3','')}</div>`).join('')}`;
        }

        function playAllFromPlaylist(name) {
            const songs = db.filter(f => playlists[name].includes(f.name));
            if (songs.length > 0) {
                queue = [...songs];
                playAt(db.indexOf(queue.shift()));
                showToast("Reproduciendo lista", "var(--accent)");
            }
        }

        function playAt(i) { if(i === -1) return; currentIdx = i; audio.src = URL.createObjectURL(db[i]); audio.play(); isPlaying = true; updateUI(); }
        function togglePlay() { if(!audio.src) return; isPlaying ? audio.pause() : audio.play(); isPlaying = !isPlaying; updateUI(); }
        function updateUI() { 
            document.getElementById('play-icon').innerHTML = isPlaying ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
            document.getElementById('current-track').innerText = currentIdx !== -1 ? db[currentIdx].name : "Spotijai";
        }

        audio.ontimeupdate = () => { if (!isNaN(audio.duration)) { seek.value = (audio.currentTime / audio.duration) * 100; document.getElementById('time-cur').innerText = formatTime(audio.currentTime); document.getElementById('time-total').innerText = formatTime(audio.duration); } };
        seek.oninput = () => { if(audio.duration) audio.currentTime = (seek.value / 100) * audio.duration; };
        function formatTime(s) { const m = Math.floor(s / 60); const sec = Math.floor(s % 60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; }
        function next() { if (queue.length > 0) playAt(db.indexOf(queue.shift())); else if (currentIdx < db.length - 1) playAt(currentIdx + 1); }
        function prev() { if(currentIdx > 0) playAt(currentIdx - 1); }
        function addToQueue(f) { queue.push(f); showToast("En cola", "var(--orange)"); renderPanelHome(); }
        function showToast(m, c) { const t = document.getElementById('toast'); t.innerText = m; t.style.background = c; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 1500); }
        
        audio.onended = () => next();
        renderPanelHome();
    </script>
</body>
</html>
