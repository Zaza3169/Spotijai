<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotijai - Smooth</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0a84ff; --gray: #8e8e93; --light-gray: #2c2c2e; --orange: #ff9f0a; }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: white; margin: 0; padding: 0 20px 220px; overscroll-behavior: none; }
        body.modal-open { overflow: hidden; position: fixed; width: 100%; }
        header { padding: 60px 0 20px; }
        h1 { font-size: 34px; font-weight: 700; }
        #search-bar { width: 100%; padding: 12px 16px; border-radius: 10px; border: none; background: var(--light-gray); color: white; font-size: 17px; margin: 20px 0; outline: none; }
        
        .song-wrapper { position: relative; margin-bottom: 1px; height: 60px; background: #000; overflow: hidden; touch-action: pan-y; }
        .bg-container { position: absolute; width: 100%; height: 100%; display: flex; font-size: 12px; font-weight: 600; }
        .bg-queue { flex: 1; background: var(--orange); display: flex; align-items: center; padding-left: 20px; color: black; }
        .bg-pl { flex: 1; background: var(--accent); display: flex; align-items: center; justify-content: flex-end; padding-right: 20px; }
        .song-content { position: absolute; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; padding: 0 5px; z-index: 2; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); border-bottom: 0.5px solid #222; }
        .song-content.active { color: var(--accent); }

        /* PANEL CON ANIMACIÓN FLUIDA */
        .player-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(28, 28, 30, 0.98); backdrop-filter: saturate(180%) blur(25px); 
            -webkit-backdrop-filter: saturate(180%) blur(25px); 
            z-index: 1000; border-top: 0.5px solid #333; 
            height: 92vh; 
            /* Estado inicial: abajo */
            transform: translateY(calc(92vh - 170px)); 
            /* Curva de Apple: suave al inicio y al final */
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
            display: flex; flex-direction: column; 
        }
        .player-panel.expanded { transform: translateY(0); border-radius: 20px 20px 0 0; }
        .player-panel.dragging { transition: none; } /* Quita la transición mientras arrastras para que sea instantáneo */

        .controls-container { padding: 0 30px; }
        input[type="range"] { width: 100%; accent-color: white; margin: 20px 0 10px; height: 3px; background: #444; border-radius: 2px; appearance: none; }
        .time-info { display: flex; justify-content: space-between; color: var(--gray); font-size: 12px; }
        .main-controls { display: flex; justify-content: space-around; align-items: center; padding: 20px 40px; }
        .play-btn { background: white; border-radius: 50%; width: 56px; height: 56px; border: none; display: flex; align-items: center; justify-content: center; }
        .queue-view { flex: 1; overflow-y: auto; padding: 30px; }
        
        #action-sheet { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: flex-end; }
        .sheet-content { background: #1c1c1e; width: 100%; border-radius: 15px 15px 0 0; padding-bottom: 40px; transform: translateY(100%); transition: transform 0.3s ease; }
        .sheet-item { padding: 18px; text-align: center; color: var(--accent); font-size: 20px; border-bottom: 0.5px solid #333; }
        #toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 16px; border-radius: 20px; opacity: 0; transition: 0.3s; z-index: 3000; }
        #file-in { display: none; }
    </style>
</head>
<body>
    <header>
        <div style="display:flex; justify-content:space-between; align-items:baseline;">
            <h1>Biblioteca</h1>
            <button style="color:var(--accent); background:none; border:none; font-size:17px;" onclick="document.getElementById('file-in').click()">Añadir</button>
        </div>
        <input type="text" id="search-bar" placeholder="Buscar canciones">
    </header>

    <div id="main-list"></div>
    <div id="toast"></div>
    
    <div id="action-sheet" onclick="closeSheet()">
        <div class="sheet-content" id="sheet-box" onclick="event.stopPropagation()">
            <div id="playlist-options"></div>
            <div class="sheet-item" onclick="createNewPlaylist()">Nueva Playlist...</div>
            <div class="sheet-item" style="color:#ff453a; border:none;" onclick="closeSheet()">Cancelar</div>
        </div>
    </div>

    <input type="file" id="file-in" webkitdirectory directory multiple>

    <div class="player-panel" id="player">
        <div id="drag-zone" style="padding:20px 0; touch-action: none; cursor: grab;">
            <div style="width:36px; height:5px; background:#444; border-radius:3px; margin:0 auto;"></div>
        </div>
        <div id="current-track" style="text-align:center; font-size:17px; font-weight:600; padding:0 40px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Selecciona música</div>
        <div class="controls-container"><input type="range" id="seek" value="0" step="0.1"><div class="time-info"><span id="time-cur">0:00</span><span id="time-total">0:00</span></div></div>
        <div class="main-controls">
            <button onclick="prev()" style="background:none; border:none;"><svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button onclick="togglePlay()" class="play-btn"><svg id="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="black"><path d="M8 5v14l11-7z"/></svg></button>
            <button onclick="next()" style="background:none; border:none;"><svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"/></svg></button>
        </div>
        <div class="queue-view" id="panel-content"></div>
    </div>

    <script>
        let db = [], queue = [], currentIdx = -1, isPlaying = false, pendingFile = null;
        let playlists = JSON.parse(localStorage.getItem('spotijai_vFinal')) || {};
        const audio = new Audio();
        const player = document.getElementById('player');
        let pStartY = 0;

        // GESTO DE BAJAR/SUBIR PANEL REFORZADO
        const dragZone = document.getElementById('drag-zone');
        
        dragZone.ontouchstart = e => {
            pStartY = e.touches[0].clientY;
            player.classList.add('dragging');
        };

        dragZone.ontouchmove = e => {
            let currentY = e.touches[0].clientY;
            let diff = currentY - pStartY;
            
            // Si el panel está arriba y deslizamos hacia abajo, lo movemos con el dedo
            if (player.classList.contains('expanded') && diff > 0) {
                player.style.transform = `translateY(${diff}px)`;
            } 
            // Si el panel está abajo y deslizamos hacia arriba
            else if (!player.classList.contains('expanded') && diff < 0) {
                let basePos = window.innerHeight * 0.92 - 170;
                player.style.transform = `translateY(${basePos + diff}px)`;
            }
        };

        dragZone.ontouchend = e => {
            player.classList.remove('dragging');
            player.style.transform = ''; // Limpiar el estilo manual para que la clase CSS tome el mando
            let diff = pStartY - e.changedTouches[0].clientY;

            // Umbral de 80px para decidir si se queda arriba o baja
            if (diff > 80) { 
                player.classList.add('expanded'); 
                document.body.classList.add('modal-open'); 
            } else if (diff < -80) { 
                player.classList.remove('expanded'); 
                document.body.classList.remove('modal-open'); 
            }
        };

        // El resto del código se mantiene igual para no romper la funcionalidad
        document.getElementById('file-in').onchange = e => { db = Array.from(e.target.files).filter(f => f.name.endsWith('.mp3')); filterAll(); };
        document.getElementById('search-bar').oninput = () => filterAll();
        function filterAll() { renderMainList(document.getElementById('search-bar').value.toLowerCase()); renderPanelHome(); }

        function renderMainList(query = "") {
            const list = document.getElementById('main-list');
            const filtered = db.filter(f => f.name.toLowerCase().includes(query));
            list.innerHTML = filtered.map((f, i) => `<div class="song-wrapper"><div class="bg-container"><div class="bg-queue">Siguiente ⏭️</div><div class="bg-pl">Playlist 📝</div></div><div class="song-content ${currentIdx !== -1 && db[currentIdx].name === f.name ? 'active' : ''}" id="sm-${i}"><span style="padding-left:10px">${f.name.replace('.mp3','')}</span></div></div>`).join('');
            filtered.forEach((f, i) => attachGestures(`sm-${i}`, f));
        }

        function attachGestures(id, file) {
            const el = document.getElementById(id);
            let startX = 0, startY = 0, currentX = 0, isHorizontal = false, isFirstMove = true;
            el.ontouchstart = e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; el.style.transition = 'none'; isFirstMove = true; isHorizontal = false; };
            el.ontouchmove = e => {
                let dx = e.touches[0].clientX - startX; let dy = e.touches[0].clientY - startY;
                if (isFirstMove) { if (Math.abs(dx) > Math.abs(dy)) isHorizontal = true; isFirstMove = false; }
                if (isHorizontal) { currentX = dx; el.style.transform = `translateX(${currentX}px)`; if (e.cancelable) e.preventDefault(); }
            };
            el.ontouchend = e => {
                el.style.transition = 'transform 0.3s ease'; el.style.transform = 'translateX(0)';
                let finalX = e.changedTouches[0].clientX; let finalY = e.changedTouches[0].clientY;
                let dist = Math.sqrt(Math.pow(finalX - startX, 2) + Math.pow(finalY - startY, 2));
                if (isHorizontal) {
                    if (currentX > 100) addToQueue(file); else if (currentX < -100) openPlaylistMenu(file);
                } else if (dist < 6) { playAt(db.findIndex(f => f.name === file.name)); }
                currentX = 0;
            };
        }

        function playAt(i) {
            if(i === -1) return;
            currentIdx = i;
            audio.src = URL.createObjectURL(db[i]);
            audio.play(); isPlaying = true;
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({ title: db[i].name.replace('.mp3',''), artist: 'Spotijai' });
                navigator.mediaSession.setActionHandler('previoustrack', () => prev());
                navigator.mediaSession.setActionHandler('nexttrack', () => next());
            }
            updateUI(); filterAll();
        }

        function togglePlay() { if(!audio.src) return; isPlaying ? audio.pause() : audio.play(); isPlaying = !isPlaying; updateUI(); }
        function updateUI() { 
            document.getElementById('play-icon').innerHTML = isPlaying ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
            document.getElementById('current-track').innerText = currentIdx !== -1 ? db[currentIdx].name.replace('.mp3','') : "Spotijai";
        }

        audio.ontimeupdate = () => { if (!isNaN(audio.duration)) { document.getElementById('seek').value = (audio.currentTime / audio.duration) * 100; document.getElementById('time-cur').innerText = formatTime(audio.currentTime); document.getElementById('time-total').innerText = formatTime(audio.duration); } };
        document.getElementById('seek').oninput = e => { if(audio.duration) audio.currentTime = (e.target.value / 100) * audio.duration; };
        function formatTime(s) { const m = Math.floor(s / 60); const sec = Math.floor(s % 60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; }
        function next() { if (queue.length > 0) { let nextFile = queue.shift(); playAt(db.findIndex(f => f.name === nextFile.name)); } else if (currentIdx < db.length - 1) { playAt(currentIdx + 1); } }
        function prev() { if(currentIdx > 0) playAt(currentIdx - 1); }
        function openPlaylistMenu(file) { pendingFile = file; const options = document.getElementById('playlist-options'); options.innerHTML = Object.keys(playlists).map(n => `<div class="sheet-item" onclick="saveToPlaylist('${n}')">${n}</div>`).join(''); document.getElementById('action-sheet').style.display = 'flex'; setTimeout(() => document.getElementById('sheet-box').style.transform = 'translateY(0)', 10); }
        function saveToPlaylist(n) { if (playlists[n].includes(pendingFile.name)) { showToast("Ya está en la lista"); } else { playlists[n].push(pendingFile.name); localStorage.setItem('spotijai_vFinal', JSON.stringify(playlists)); showToast("Añadido"); } closeSheet(); renderPanelHome(); }
        function createNewPlaylist() { let n = prompt("Nombre:"); if(n) { playlists[n] = []; saveToPlaylist(n); } }
        function closeSheet() { document.getElementById('sheet-box').style.transform = 'translateY(100%)'; setTimeout(() => document.getElementById('action-sheet').style.display = 'none', 300); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 1500); }
        function renderPanelHome() { const content = document.getElementById('panel-content'); content.innerHTML = `<h2 style="font-size:20px; margin-bottom:15px;">En cola</h2><div style="margin-bottom:30px;">${queue.map(f => `<div style="padding:12px 0; border-bottom:0.5px solid #222; color:var(--gray);">${f.name}</div>`).join('') || '<p style="color:#444">Fin de la lista</p>'}</div><h2 style="font-size:20px; margin-bottom:15px;">Playlists</h2>${Object.keys(playlists).map(n => `<div style="background:var(--light-gray); padding:16px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between;" onclick="renderPlaylistDetail('${n}')"><span>📂 ${n}</span><span style="color:var(--gray)">${playlists[n].length} ›</span></div>`).join('')}`; }
        function renderPlaylistDetail(name) { const content = document.getElementById('panel-content'); const songs = db.filter(f => playlists[name].includes(f.name)); content.innerHTML = `<div onclick="renderPanelHome()" style="color:var(--accent); margin-bottom:15px; font-weight:600;">‹ Atrás</div><h2>${name}</h2><button onclick="playAllFromPlaylist('${name}')" style="width:100%; background:white; color:black; border:none; padding:14px; border-radius:12px; font-weight:700; margin-bottom:20px;">Reproducir Todo</button>${songs.map(f => `<div onclick="playAt(db.indexOf(db.find(x=>x.name==='${f.name}')))" style="padding:15px 0; border-bottom:0.5px solid #222;">${f.name.replace('.mp3','')}</div>`).join('')}`; }
        function playAllFromPlaylist(n) { const s = db.filter(f => playlists[n].includes(f.name)); if(s.length){ queue = [...s]; playAt(db.indexOf(queue.shift())); } }
        function addToQueue(f) { if (!queue.find(q => q.name === f.name)) { queue.push(f); showToast("En cola"); renderPanelHome(); } else { showToast("Ya está en cola"); } }
        audio.onended = () => next();
        renderPanelHome();
    </script>
</body>
</html>
